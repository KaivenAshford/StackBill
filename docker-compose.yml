services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: stackbill
      POSTGRES_PASSWORD: stackbill_password
      POSTGRES_DB: stackbill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackbill"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: stackbill
      DB_PASSWORD: stackbill_password
      DB_NAME: stackbill
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/config.yaml:/app/config.yaml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
